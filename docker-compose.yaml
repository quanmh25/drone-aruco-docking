services:
  ros:
    image: quanmh25/drone_aruco_docking:latest
    container_name: drone_aruco_docking
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      XDG_RUNTIME_DIR: /tmp/runtime-${USER:-ros}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: graphics,utility,compute
      LAUNCH_FILE: ${LAUNCH_FILE:-maze_run.launch.py}
    volumes:
      - .:/home/${USER:-ros}/quanmh/drone-aruco-docking:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    working_dir: /home/${USER:-ros}/quanmh/drone-aruco-docking/workspace
    command: >
      bash -lc "
        source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash &&
        colcon build --symlink-install &&
        source install/setup.bash &&
        ros2 launch drone_control ${LAUNCH_FILE:-maze_run.launch.py}
      "
